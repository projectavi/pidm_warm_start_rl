seed: 42
layout: |+
  WWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWW
  W                                       W
  W   A            WWWWW          WWWWW   W
  W                 W                W    W
  W        G        W      G         W    W
  W                 W                W    W
  W   WWWWW      WWWWW     WWWWW          W
  W                                       W
  W       G               G               W
  W                                       W
  W            G                G         W
  W                                       W
  WWWWW     WWWWW       WWWWW      WWWWW  W

room_size: [800, 800]
max_steps: 500

goal:
  num_goals: 6
  # complete them from top left, top right, bottom right, bottom left
  goal_ordering:
  - 0
  - 2
  - 4
  - 3
  - 5
  - 1
  reward_per_reached_goal: 1.0
  termination_condition: all_goals
  randomisation:
    randomise_agent_spawn: false
    randomise_goal_positions: false
observation:
  observation_type: feature_state
  observe_goals: false
  positions_relative_to_agent: false
  img_obs_size: [224, 224]
  exogenous_noise:
    add_noise: false
    feature_vector_noise_dim: 0
    feature_vector_noise_mean: 0.0
    feature_vector_noise_std: 1.0
    feature_vector_random_walk_noise_mean: 0.0
    feature_vector_random_walk_noise_std: 0.3
    image_noise_max: 256
    image_noise_min: 200
    image_random_walk_noise_max: 16
    image_random_walk_noise_min: -16
    noise_type: iid
state:
  positions_relative_to_agent: false
  exogenous_noise:
    add_noise: false
    feature_vector_noise_dim: 0
    feature_vector_noise_mean: 0.0
    feature_vector_noise_std: 1.0
    feature_vector_random_walk_noise_mean: 0.0
    feature_vector_random_walk_noise_std: 0.3
    image_noise_max: 256
    image_noise_min: 200
    image_random_walk_noise_max: 16
    image_random_walk_noise_min: -16
    noise_type: iid
action:
  control_deadzone: 0.1
  velocity_scale: [20.0, 20.0]
  add_transition_noise: false
  transition_gaussian_noise_mean: [0.0, 0.0]
  transition_gaussian_noise_std: [0.5, 0.5]
rendering:
  goal_size: 20
  agent_size: 20
  render_player_trace: true
  trace_size: 1
  max_trace_length: -1
